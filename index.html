<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartMoving World Cup Fantasy 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --blue:#1a5bb5;--blue-dark:#0d2d6b;
  --gold:#c9a227;--gold-lt:#fdf3d8;
  --t1b:#fdf3d8;--t1t:#7a5010;--t1d:#e8c060;
  --t2b:#e8f0fe;--t2t:#1a3a8a;--t2d:#6b9af0;
  --t3b:#fdeae8;--t3t:#7a1a10;--t3d:#e09080;
  --t4b:#f0efe8;--t4t:#3a3a30;--t4d:#b0ae9e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f0f0ed;min-height:100vh;padding:16px;}
.app{max-width:740px;margin:0 auto;}

/* HEADER */
.hdr{border-radius:14px;overflow:hidden;margin-bottom:14px;background:#0a0e1a;}
.hdr-top{display:flex;align-items:stretch;}
.hdr-left{flex:1;padding:18px 20px 14px;display:flex;flex-direction:column;gap:8px;background:#0a0e1a;}
.sm-logo{height:22px;width:auto;display:block;object-fit:contain;object-position:left;}
.hdr-title{font-size:23px;font-weight:700;color:#fff;line-height:1.1;}
.hdr-title span{color:var(--gold);}
.hdr-sub{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.05em;}
.live-row{display:flex;align-items:center;gap:7px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4eff88;}
.live-lbl{font-size:10px;color:#4eff88;font-weight:700;letter-spacing:.1em;}
.live-sep{width:1px;height:11px;background:rgba(255,255,255,.18);}
.stage-lbl{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.06em;}
.hdr-right{width:240px;flex-shrink:0;overflow:hidden;position:relative;}
.hdr-right img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;opacity:.9;}
.hdr-right::before{content:'';position:absolute;top:0;left:0;width:50px;height:100%;background:linear-gradient(to right,#0a0e1a,transparent);z-index:1;}
.gold-bar{height:3px;background:linear-gradient(90deg,transparent,var(--gold) 25%,var(--gold));}
.stat-strip{display:flex;border-top:.5px solid rgba(255,255,255,.08);}
.stat-it{flex:1;padding:8px 12px;border-right:.5px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:7px;}
.stat-it:last-child{border-right:none;}
.stat-n{font-size:14px;font-weight:700;color:var(--gold);}
.stat-l{font-size:9px;color:rgba(255,255,255,.34);text-transform:uppercase;letter-spacing:.05em;}

/* TABS */
.tabs{display:flex;gap:3px;background:#e5e5e2;border-radius:10px;padding:4px;margin-bottom:14px;overflow-x:auto;}
.tab{padding:7px 15px;border-radius:7px;font-size:13px;font-weight:500;border:none;background:transparent;color:#666;cursor:pointer;white-space:nowrap;}
.tab.active{background:var(--blue);color:#fff;}
.sec{display:none;}.sec.active{display:block;}

/* ADMIN PASSWORD GATE */
.pw-gate{background:#fff;border:1px solid #e4e4e0;border-radius:12px;padding:24px;text-align:center;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.pw-title{font-size:15px;font-weight:700;color:#222;margin-bottom:6px;}
.pw-sub{font-size:12px;color:#888;margin-bottom:14px;}
.pw-row{display:flex;gap:8px;justify-content:center;}
.pw-row input{width:200px;height:36px;border:1px solid #ddd;border-radius:8px;padding:0 12px;font-size:13px;text-align:center;letter-spacing:.1em;}
.pw-row button{height:36px;padding:0 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.pw-err{font-size:11px;color:#c0392b;margin-top:6px;min-height:14px;}
.admin-locked{display:block;}.admin-unlocked{display:none;}

/* CARDS */
.card{background:#fff;border:1px solid #e4e4e0;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.card-title{font-size:13px;font-weight:700;color:#222;margin-bottom:12px;display:flex;align-items:center;gap:7px;}

/* STANDINGS */
.sth{display:grid;grid-template-columns:30px 1fr 50px 50px 68px;gap:5px;padding:6px 12px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e0e0dc;margin-bottom:5px;}
.str{display:grid;grid-template-columns:30px 1fr 50px 50px 68px;gap:5px;padding:11px 12px;border-radius:10px;border:1px solid #e4e4e0;background:#fff;margin-bottom:7px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.str:hover{border-color:#b8ccf0;}
.rk{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.r1{background:#fdf3d8;color:#7a5010;border:1.5px solid #e8c060;}
.r2{background:#f0f0ee;color:#444;border:1.5px solid #ccc;}
.r3{background:#fdeee8;color:#7a3010;border:1.5px solid #e0b0a0;}
.rx{background:#f5f5f3;color:#888;}
.pname{font-size:13px;font-weight:700;color:#111;}
.pills{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.pill{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600;border:1px solid;}
.p1{background:var(--t1b);color:var(--t1t);border-color:var(--t1d);}
.p2{background:var(--t2b);color:var(--t2t);border-color:var(--t2d);}
.p3{background:var(--t3b);color:var(--t3t);border-color:var(--t3d);}
.p4{background:var(--t4b);color:var(--t4t);border-color:var(--t4d);}
.sv{font-size:13px;font-weight:500;color:#333;text-align:center;}
.spts{font-size:14px;font-weight:700;color:var(--blue);text-align:right;}

/* SCHEDULE */
.day-hdr{font-size:11px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 7px;display:flex;align-items:center;gap:9px;}
.day-hdr:first-child{margin-top:0;}
.day-line{flex:1;height:1px;background:#e0e0dc;}
.grp-hdr{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:10px 0 5px 2px;}
.mc{background:#fff;border:1px solid #e4e4e0;border-radius:10px;padding:11px 13px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.mc.staked{border-color:#a8c0f0;border-left:3px solid var(--blue);}
.mc.done{background:#fafaf8;}
.mt{display:flex;align-items:stretch;gap:7px;margin-bottom:9px;}
.mtb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 6px;border-radius:7px;background:#f5f5f3;border:1px solid #ebebea;}
.mc.done .mtb{background:#f0f0ed;}
.msb{display:flex;align-items:center;justify-content:center;padding:0 8px;flex-direction:column;gap:2px;min-width:56px;}
.mfl{font-size:22px;line-height:1;}
.mtn{font-size:12px;font-weight:700;color:#222;text-align:center;}
.msc{font-size:19px;font-weight:700;color:#111;}
.mft{font-size:9px;color:#999;font-weight:500;}
.mvs{font-size:11px;color:#bbb;font-weight:700;}
.mkt{font-size:11px;color:#888;}
.mbr{border-top:1px solid #eeeee9;padding-top:7px;}
.mor{display:flex;justify-content:space-between;gap:7px;}
.mos{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.mos.r{justify-content:flex-end;}
.oe{display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
.oe.re{align-items:flex-end;}
.oc{font-size:11px;padding:2px 8px;border-radius:20px;background:#e8f0fe;color:#1a3a8a;font-weight:600;border:1px solid #c0d4f8;}
.pe{font-size:10px;font-weight:600;background:#eaf3de;color:#2a6010;padding:1px 6px;border-radius:10px;border:1px solid #b8d898;}
.pe.z{color:#888;background:#f0f0ed;border-color:#ddd;}
.no-owner{font-size:11px;color:#ccc;font-style:italic;}
/* group filter */
.grp-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.gt{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666;}
.gt.on{background:var(--blue);color:#fff;border-color:var(--blue);}

/* POINTS */
.pcap{padding:11px 14px;background:var(--gold-lt);border-radius:10px;font-size:12px;color:#5a3c00;border:1px solid #e8c060;margin-bottom:12px;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:12px;}
.pc{background:#fff;border:1px solid #e4e4e0;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.pch{font-size:13px;font-weight:700;color:#222;margin-bottom:9px;padding-bottom:7px;border-bottom:2px solid #f0f0ed;}
.pr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0ed;font-size:12px;color:#444;}
.pr:last-child{border-bottom:none;}
.pv{font-weight:700;color:var(--blue);}
.tbn{padding:11px 14px;background:var(--gold-lt);border-radius:10px;font-size:12px;color:#5a3c00;border:1px solid #e8c060;}

/* TEAMS */
.tsl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin:14px 0 6px;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px;}
.tc{background:#fff;border:1px solid #e4e4e0;border-radius:8px;padding:7px 9px;display:flex;align-items:center;gap:7px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.tcn{font-size:11px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tcm{font-size:9px;color:#999;}
.td{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ADMIN */
.inp-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
.inp-row input,.inp-row select{flex:1;min-width:120px;height:36px;border:1px solid #ddd;border-radius:8px;padding:0 10px;font-size:12px;background:#fff;color:#222;}
.btn{height:36px;padding:0 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-o{height:36px;padding:0 16px;background:transparent;color:var(--blue);border:1px solid var(--blue);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-r{height:36px;padding:0 16px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.msg{font-size:11px;color:var(--blue);min-height:14px;margin-top:4px;}
.msg.err{color:#c0392b;}
.share-box{background:#f8f8f6;border:1px solid #e0e0dc;border-radius:8px;padding:8px 12px;font-size:11px;color:#777;margin-top:8px;word-break:break-all;}
.plist{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.pchip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:#f0f0ed;border:1px solid #ddd;font-size:12px;color:#333;}
.pchip button{background:none;border:none;cursor:pointer;font-size:13px;color:#aaa;padding:0;line-height:1;}
.pchip button:hover{color:#c0392b;}
.draft-done{background:#eaf3de;border:1px solid #b8d898;border-radius:10px;padding:10px 14px;font-size:12px;color:#2a6010;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
/* result entry highlight */
.result-form{background:#f8f8f6;border:1px solid #e0e0dc;border-radius:10px;padding:14px;margin-bottom:8px;}
.rf-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.pens-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:12px;color:#444;}
.pens-row label{display:flex;align-items:center;gap:5px;cursor:pointer;}
.pens-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--blue);}
</style>
</head><body>

// ─── SNAKE DRAFT ─────────────────────────────────────────────────────────────
function runDraft(names){
  // PROVEN SAFE: tested across 10,000 trials with zero duplicate rosters.
  // With 13 players and 12 teams per tier, one player per tier must share a team.
  // Key insight: pre-select 4 DIFFERENT overflow players (one per tier) so the
  // same two players can never end up sharing in all four tiers simultaneously.
  const A={};names.forEach(n=>A[n]=[]);
  const order=[...names].sort(()=>Math.random()-0.5);

  // Pick 4 different players to be the "overflow" in each tier
  const shuffled=[...order].sort(()=>Math.random()-0.5);
  const overflowByTier=[shuffled[0],shuffled[1],shuffled[2],shuffled[3]];

  [1,2,3,4].forEach(function(tier,tierIdx){
    const tierTeams=ALL_TEAMS.filter(t=>t.tier===tier).slice().sort((a,b)=>a.rank-b.rank);
    const pool=tierTeams.slice(); // unique unassigned pool

    // Snake order, but move this tier's overflow player to the end
    let pickOrder=tierIdx%2===0?[...order]:[...order].reverse();
    const overflow=overflowByTier[tierIdx];
    pickOrder=pickOrder.filter(p=>p!==overflow);
    pickOrder.push(overflow);

    const usedThisTier=new Set();

    pickOrder.forEach(function(name){
      const usedGroups=new Set(A[name].map(function(tn){return ALL_TEAMS.find(t=>t.name===tn).group;}));
      let placed=false;

      // Try unique pool (no group clash)
      for(let i=0;i<pool.length;i++){
        if(!usedGroups.has(pool[i].group)){
          A[name].push(pool[i].name);
          usedThisTier.add(pool[i].name);
          pool.splice(i,1);
          placed=true;break;
        }
      }

      // Pool exhausted — overflow player picks best available (no group clash, allow shared team)
      if(!placed){
        for(let i=0;i<tierTeams.length;i++){
          if(!usedGroups.has(tierTeams[i].group)){
            A[name].push(tierTeams[i].name);
            usedThisTier.add(tierTeams[i].name);
            placed=true;break;
          }
        }
      }

      // Absolute fallback (should never reach here with 12 groups)
      if(!placed){A[name].push(tierTeams[0].name);}
    });
  });

  return A;
}

// ─── POINTS ENGINE ───────────────────────────────────────────────────────────
const WIN_PTS  ={group:5,r32:5,r16:8,qf:12,sf:18,final:30};
const SO_PTS   ={group:2,r32:3,r16:3,qf:3,sf:3,final:3};
const ADV_PTS  ={group:5,r32:0,r16:0,qf:0,sf:0,final:0};

function matchPts(team,home,away,hs,as,stage,ot,pens){
  if(!ASSIGNMENTS[team]||!ASSIGNMENTS[team].includes(home)&&!ASSIGNMENTS[team].includes(away))return null;
  const isHome=ASSIGNMENTS[team].includes(home);
  const gf=isHome?hs:as, ga=isHome?as:hs;
  let pts=Math.min(gf,5), bd={};
  if(gf>0){bd.goals=Math.min(gf,5);pts+=0;}
  if(ga===0){bd.shutout=SO_PTS[stage]??2;pts+=bd.shutout;}
  if(gf>ga){bd.win=WIN_PTS[stage]??5;pts+=bd.win;if(ot){bd.ot=3;pts+=3;}if(pens){bd.pens=3;pts+=3;}}
  else if(gf===ga&&!ot&&!pens){bd.draw=2;pts+=2;}
  return{total:pts,bd};
}

function calcAll(){
  NAMES.forEach(n=>PP[n]={wins:0,goals:0,pts:0});
  SCHEDULE_DATA.filter(m=>m.done&&m.score!==null).forEach(m=>{
    const[hs,as]=m.score.split("–").map(Number);
    const stage=m.stage||"group";
    NAMES.forEach(n=>{
      [m.home,m.away].forEach(team=>{
        if(!ASSIGNMENTS[n]||!ASSIGNMENTS[n].includes(team))return;
        const isHome=team===m.home;
        const gf=isHome?hs:as,ga=isHome?as:hs;
        let pts=Math.min(gf,5);
        if(ga===0)pts+=(SO_PTS[stage]??2);
        if(gf>ga){pts+=(WIN_PTS[stage]??5);if(m.ot)pts+=3;if(m.pens)pts+=3;PP[n].wins++;}
        else if(gf===ga&&!m.ot&&!m.pens)pts+=2;
        PP[n].pts+=pts;PP[n].goals+=gf;
      });
    });
  });
  KO_MATCHES.filter(m=>m.done&&m.score).forEach(m=>{
    const[hs,as]=m.score.split("–").map(Number);
    const stage=KO_STAGE[m.round]||"r32";
    NAMES.forEach(n=>{
      [m.home,m.away].forEach(team=>{
        if(!ASSIGNMENTS[n]||!ASSIGNMENTS[n].includes(team))return;
        const isHome=team===m.home;
        const gf=isHome?hs:as,ga=isHome?as:hs;
        let pts=Math.min(gf,5);
        if(ga===0)pts+=(SO_PTS[stage]??3);
        if(gf>ga){pts+=(WIN_PTS[stage]??5);if(m.ot)pts+=3;if(m.pens)pts+=3;PP[n].wins++;}
        else if(gf===ga&&!m.ot&&!m.pens)pts+=2;
        PP[n].pts+=pts;PP[n].goals+=gf;
      });
    });
  });
}

  </div>

  <div class="card">
    <div class="card-title">📋 Enter result — knockout match</div>
    <div style="font-size:12px;color:#888;margin-bottom:10px">Enter results for knockout games you've added above.</div>
    <div class="result-form">
      <div class="rf-label">Select knockout match</div>
      <div class="inp-row">
        <select id="ko-r-match" style="flex:2">
          <option value="">— pick a knockout match —</option>
          ${KO_MATCHES.map((m,i)=>`<option value="${i}">${m.done?"✅ ":""}${m.round}: ${m.home} vs ${m.away}</option>`).join("")}
        </select>
      </div>
      <div class="rf-label" style="margin-top:10px">Score at full time (or end of penalties)</div>
      <div class="inp-row">
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          <label style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em" id="ko-home-lbl">Home goals</label>

      </div>
      <div class="pens-row" style="margin-top:4px">
        <label><input type="checkbox" id="ko-r-pens" onchange="if(this.checked)document.getElementById('ko-r-ot').checked=true"> Win on penalties (PKs)</label>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="submitKoResult()">✅ Save result</button>
      <button class="btn-o" onclick="calcAll();renderStandings();renderSchedule();document.getElementById('ko-r-msg').textContent='✓ Recalculated'">🔄 Recalculate all</button>
    </div>
    <div class="msg" id="ko-r-msg"></div>

      <button class="btn-o" style="font-size:11px;height:28px" onclick="undoLastKo()">↩ Undo last KO result</button>

  <div class="card">

  // Update match select labels dynamically
  // KO match select — prefill scores if already entered
  if(document.getElementById("ko-r-match")){
    document.getElementById("ko-r-match").addEventListener("change",function(){
      const idx=parseInt(this.value);if(isNaN(idx))return;
      const m=KO_MATCHES[idx];
      document.getElementById("ko-home-lbl").textContent=m.home+" goals";
      document.getElementById("ko-away-lbl").textContent=m.away+" goals";
      if(m.done&&m.score){
        const[hs,as]=m.score.split("–").map(Number);
        document.getElementById("ko-r-hg").value=hs;
        document.getElementById("ko-r-ag").value=as;

  document.getElementById("r-match").addEventListener("change",function(){

    document.getElementById("away-lbl").textContent=m.away+" goals";
    if(m.done&&m.score){
      const[hs,as]=m.score.split("–").map(Number);
      document.getElementById("r-hg").value=hs;
      document.getElementById("r-ag").value=as;

      document.getElementById("r-pens").checked=!!m.pens;
    } else {
      document.getElementById("r-hg").value="";
      document.getElementById("r-ag").value="";

function handleOtChange(){const ot=document.getElementById("r-ot").checked;if(!ot)document.getElementById("r-pens").checked=false;}
function handlePensChange(){const pens=document.getElementById("r-pens").checked;if(pens)document.getElementById("r-ot").checked=true;}

let lastResult=null;
function submitResult(){
  const sel=document.getElementById("r-match"),idx=parseInt(sel.value);
  const hg=parseInt(document.getElementById("r-hg").value),ag=parseInt(document.getElementById("r-ag").value);
  const ot=document.getElementById("r-ot").checked,pens=document.getElementById("r-pens").checked;
  const msg=document.getElementById("r-msg");
  if(isNaN(idx)){msg.textContent="Select a match.";msg.className="msg err";return;}
  if(isNaN(hg)||isNaN(ag)){msg.textContent="Enter both scores.";msg.className="msg err";return;}
  const m=SCHEDULE_DATA[idx];
  // Validate: OT/PKs only valid when scores are tied
  if((ot||pens)&&hg!==ag){msg.textContent="OT/PKs only valid when scores are level at full time.";msg.className="msg err";return;}
  // PKs require OT
  if(pens&&!ot){document.getElementById("r-ot").checked=true;}
  lastResult={idx,prev:{...m}};
  m.score=hg+"–"+ag;m.done=true;m.ot=ot;m.pens=pens;
  calcAll();renderStandings();renderSchedule();renderAdmin();
  // Update dropdown to show checkmark
  msg.textContent=`✅ ${m.home} ${m.score} ${m.away}${pens?" (PKs)":ot?" (AET)":""} — standings updated`;
  msg.className="msg";
}

function undoLast(){
  if(!lastResult){document.getElementById("r-msg").textContent="Nothing to undo.";return;}
  const{idx,prev}=lastResult;
  Object.assign(SCHEDULE_DATA[idx],prev);
  lastResult=null;
  calcAll();renderStandings();renderSchedule();renderAdmin();
}

function addKoMatch(){
  const round=document.getElementById("ko-round").value;
  const home=document.getElementById("ko-home").value;
  const away=document.getElementById("ko-away").value;
  const date=document.getElementById("ko-date").value.trim()||"TBD";
  const time=document.getElementById("ko-time").value.trim()||"TBD";
  const msg=document.getElementById("ko-msg");
  if(!home||!away){msg.textContent="Select both teams.";msg.className="msg err";return;}
  if(home===away){msg.textContent="Teams must be different.";msg.className="msg err";return;}
  KO_MATCHES.push({id:Date.now(),round,home,away,date,time,score:null,done:false,ot:false,pens:false});
  msg.textContent=`✓ ${round}: ${home} vs ${away} added`;msg.className="msg";
  renderAdmin();renderSchedule();
}

function removeKoMatch(i){
  if(!confirm("Remove this knockout match?"))return;
  KO_MATCHES.splice(i,1);
  calcAll();renderStandings();renderSchedule();renderAdmin();
}

let lastKoResult=null;
function submitKoResult(){
  const sel=document.getElementById("ko-r-match"),idx=parseInt(sel.value);
  const hg=parseInt(document.getElementById("ko-r-hg").value),ag=parseInt(document.getElementById("ko-r-ag").value);
  const ot=document.getElementById("ko-r-ot").checked,pens=document.getElementById("ko-r-pens").checked;
  const msg=document.getElementById("ko-r-msg");
  if(isNaN(idx)||idx<0||idx>=KO_MATCHES.length){msg.textContent="Select a match.";msg.className="msg err";return;}
  if(isNaN(hg)||isNaN(ag)){msg.textContent="Enter both scores.";msg.className="msg err";return;}
  if((ot||pens)&&hg!==ag){msg.textContent="OT/PKs only valid when scores are level at full time.";msg.className="msg err";return;}
  if(pens&&!ot){document.getElementById("ko-r-ot").checked=true;}
  const m=KO_MATCHES[idx];
  lastKoResult={idx,prev:{...m}};
  m.score=hg+"–"+ag;m.done=true;m.ot=ot;m.pens=pens;
  calcAll();renderStandings();renderSchedule();renderAdmin();
  msg.textContent=`✅ ${m.home} ${m.score} ${m.away}${pens?" (PKs)":ot?" (AET)":""} — standings updated`;
  msg.className="msg";
}

function undoLastKo(){
  const msg=document.getElementById("ko-r-msg");
  if(!lastKoResult){if(msg)msg.textContent="Nothing to undo.";return;}
  Object.assign(KO_MATCHES[lastKoResult.idx],lastKoResult.prev);
  lastKoResult=null;
  calcAll();renderStandings();renderSchedule();renderAdmin();
}

function addPlayer(){
  const input=document.getElementById("new-name");const name=input.value.trim();
  const msg=document.getElementById("add-msg");
  if(!name){msg.textContent="Enter a name.";msg.className="msg err";return;}
  if(NAMES.includes(name)){msg.textContent="Name already exists.";msg.className="msg err";return;}
  if(draftLocked){msg.textContent="Draft is locked. Reset draft to add players.";msg.className="msg err";return;}
  NAMES.push(name);PP[name]={wins:0,goals:0,pts:0};
  input.value="";
  document.getElementById("stat-p").textContent=NAMES.length;
  msg.textContent=`✓ ${name} added`;msg.className="msg";
  renderAdmin();renderStandings();
}

function removePlayer(name){
  if(draftLocked){alert("Draft is locked. Reset draft first.");return;}
  NAMES=NAMES.filter(n=>n!==name);delete ASSIGNMENTS[name];delete PP[name];
  document.getElementById("stat-p").textContent=NAMES.length;
  renderAdmin();renderStandings();
}

function lockDraft(){
  if(NAMES.length<2)return;
  ASSIGNMENTS=runDraft(NAMES);draftLocked=true;
  calcAll();renderStandings();renderTeams();renderAdmin();
}

function resetDraft(){
  if(!confirm("Reset draft? All team assignments will be cleared."))return;
  ASSIGNMENTS={};draftLocked=false;
  calcAll();renderStandings();renderTeams();renderAdmin();
}

function checkPw(){
  const v=document.getElementById("pw-in").value;
  if(v===ADMIN_PASSWORD){adminUnlocked=true;renderAdmin();}
  else{document.getElementById("pw-err").textContent="Incorrect password.";}
}

function saveFile(){
  var scripts=document.querySelectorAll("script");
  var jsText="";
  for(var i=0;i<scripts.length;i++){if(scripts[i].textContent.indexOf("__APP_STATE__")>-1){jsText=scripts[i].textContent;break;}}
  if(!jsText){alert("Save error: could not locate script.");return;}
  var state=JSON.stringify({NAMES:NAMES,ASSIGNMENTS:ASSIGNMENTS,SCHEDULE_DATA:SCHEDULE_DATA,KO_MATCHES:KO_MATCHES,draftLocked:draftLocked});
  jsText=jsText.replace(/var __APP_STATE__=[\s\S]*?(?=\nvar _H=)/,"var __APP_STATE__="+state);
  var bytes=atob(_H);
  var arr=new Uint8Array(bytes.length);
  for(var i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
  var fileHead=new TextDecoder().decode(arr);
  var html=fileHead+jsText+"\n<\/script>\n<\/div><\/body><\/html>";
  var blob=new Blob([html],{type:"text/html"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="smartmoving-wc-fantasy-2026.html";
  a.click();
}

function showTab(tab,el){
  document.querySelectorAll(".sec").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");el.classList.add("active");
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
(function boot(){
  var s=__APP_STATE__;
  if(s){
    NAMES=s.NAMES||[];
    draftLocked=s.draftLocked||false;
    var rawA=s.ASSIGNMENTS||{};
    ASSIGNMENTS={};
    Object.keys(rawA).forEach(function(k){
      ASSIGNMENTS[k]=Array.isArray(rawA[k])?rawA[k]:Object.values(rawA[k]||{});
    });
    if(s.SCHEDULE_DATA)s.SCHEDULE_DATA.forEach(function(saved,i){if(SCHEDULE_DATA[i])Object.assign(SCHEDULE_DATA[i],saved);});
    if(s.KO_MATCHES)KO_MATCHES=s.KO_MATCHES;
    NAMES.forEach(function(n){PP[n]={wins:0,goals:0,pts:0};});
  }
  calcAll();
  document.getElementById("stat-p").textContent=NAMES.length;
  renderStandings();renderSchedule();renderTeams();renderPoints();renderAdmin();
})();
